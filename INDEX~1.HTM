function leakT(b){return Math.max(0,b.g2-(b.plan.collect.g2||0));}
function recT(b){return ['g3','g4','g5','g6','g7'].reduce(function(s,k){return s+(b.plan.rec[k]||0);},0);}
function rec36(b){return ['g3','g4','g5','g6'].reduce(function(s,k){return s+(b.plan.rec[k]||0);},0);}
function rec7(b){return b.plan.rec.g7||0;}
function cutT(b){return ['g3','g4','g5','g6','g7'].reduce(function(s,k){return s+(b.plan.cut[k]||0);},0);}
function cut36(b){return ['g3','g4','g5','g6'].reduce(function(s,k){return s+(b.plan.cut[k]||0);},0);}
function cut7(b){return b.plan.cut.g7||0;}
function collectSum(b){return ['g0','g1','g2'].reduce(function(s,k){return s+Math.min(b.plan.collect[k]||0,b[k]);},0);}
function planGood(b){return b.good-leakT(b)+recT(b)+b.plan.sales-b.plan.matureN;}
function planTot(b){return b.total-cutT(b)+b.plan.sales-b.plan.matureClose;}
function planPct(b){return planTot(b)>0?planGood(b)/planTot(b):0;}
function g36new(b){return b.mid+leakT(b)-rec36(b)-cut36(b)+(b.plan.matureN-b.plan.matureClose);}
function g7new(b){return b.lt-rec7(b)-cut7(b);}
function setT(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v;}
function kpiText(b){var cs=collectSum(b);return 'KPI การเก็บงวด 0-2: เก็บได้ <b>'+fmt(cs)+'</b> / งาน <b>'+fmt(b.good)+'</b> = <b>'+pct(b.good?cs/b.good:0)+'</b> &nbsp;·&nbsp; ไหลตก (งวด2→3) <b style="color:var(--bad)">'+fmt(leakT(b))+'</b> ราย (ยิ่งน้อยยิ่งดี)';}
function grpText(lab,o,n,ot,nt){var d=(nt>0?n/nt:0)-(ot>0?o/ot:0);return '<b>'+lab+':</b> เดิม '+fmt(o)+' ('+pct(ot>0?o/ot:0)+') &rarr; ตามแผน '+fmt(n)+' (<b>'+pct(nt>0?n/nt:0)+'</b>) <span style="color:'+(d>=0?'var(--good)':'var(--bad)')+'">'+(d>=0?'+':'')+(d*100).toFixed(2)+'%</span>';}
function matureText(b){var M=b.plan.matureN,C=b.plan.matureClose;if(M<=0)return 'ไม่มีหนี้ครบกำหนดเดือนนี้';var NG=b.good-leakT(b)+recT(b)+b.plan.sales-M;var bT=b.total-cutT(b)+b.plan.sales;var pAll=(bT-M)>0?NG/(bT-M):0,pNone=bT>0?NG/bT:0,pPlan=(bT-C)>0?NG/(bT-C):0;return '<b>หนี้ครบกำหนด '+fmt(M)+' ราย (เป็นหนี้ดี):</b> ปิดได้ทั้งหมด=<b style="color:var(--good)">'+pct(pAll)+'</b> &nbsp;|&nbsp; ปิดไม่ได้เลย(ตกชั้นไปงวด3)=<b style="color:var(--bad)">'+pct(pNone)+'</b> &nbsp;|&nbsp; ตามแผนปิด '+fmt(C)+' ราย=<b>'+pct(pPlan)+'</b>';}

  return entry+'<div class="dwrap"><table><thead><tr>'+heads+'</tr></thead><tbody>'+body+'</tbody></table></div>';

function t4late(mode){

  var subFn=function(list,lab,cls){var hv=list.reduce(function(s,b){return s+have(b);},0),tr=list.reduce(function(s,b){return s+pr(b);},0),tc=list.reduce(function(s,b){return s+pc(b);},0),aar=list.reduce(function(s,b){return s+(is36?b.act.rec36:b.act.rec7);},0),aac=list.reduce(function(s,b){return s+(is36?b.act.cut36:b.act.cut7);},0);return '<tr class="'+cls+'"><td class="l">'+lab+'</td><td>'+fmt(hv)+'</td><td>'+fmt(tr)+'</td><td><b>'+fmt(aar)+'</b></td><td>'+fmt(tc)+'</td><td><b>'+fmt(aac)+'</b></td><td><b>'+pct((tr+tc)>0?(aar+aac)/(tr+tc):0)+'</b></td></tr>';};
  var h1=is36?'ดึงกลับเป็นหนี้ดี':'ดึงกลับ (ถ้าได้)', h2=is36?'ยึดรถ/ตัดออก':'ฟ้อง/ดำเนินคดี';

    '<div class="dwrap"><table><thead><tr><th class="l">สาขา</th><th>'+(is36?'งวด3-6':'งวด7+')+'ที่มี</th><th>เป้า'+h1+'</th><th>ทำได้</th><th>เป้า'+h2+'</th><th>ทำได้</th><th>%สำเร็จ</th></tr></thead><tbody>'+groupRows(rowFn,subFn)+'</tbody></table></div>';

    '<div class="dwrap"><table><thead><tr><th class="l">สาขา</th><th>เป้าขายใหม่</th><th>ขายได้จริง</th><th>เป้าปิดบัญชี</th><th>ปิดได้จริง</th><th>%สำเร็จ</th></tr></thead><tbody>'+groupRows(rowFn,subFn)+'</tbody></table></div>';

function step5(){
  var views=[['branch','รายสาขา'],['zone','สรุปรายเขต'],['type','สรุปแยกประเภทรถ'],['all','ภาพรวมทั้งหมด']];

  var cellset=function(list){var a={c:0,r36:0,c36:0,r7:0,c7:0,s:0,cl:0},t={c:0,r36:0,c36:0,r7:0,c7:0,s:0,cl:0},gAvg=0;
    list.forEach(function(b){a.c+=b.act.col;t.c+=collectSum(b);a.r36+=b.act.rec36;a.c36+=b.act.cut36;t.r36+=rec36(b);t.c36+=cut36(b);a.r7+=b.act.rec7;a.c7+=b.act.cut7;t.r7+=rec7(b);t.c7+=cut7(b);a.s+=b.act.sale;t.s+=b.plan.sales;a.cl+=b.act.close;t.cl+=b.plan.matureClose;gAvg+=b.plan.goal;});
    var aw=a.c+a.r36+a.c36+a.r7+a.c7+a.s+a.cl, tw=t.c+t.r36+t.c36+t.r7+t.c7+t.s+t.cl;
    return {goal:(gAvg/list.length).toFixed(0),c:[a.c,t.c],w36:[a.r36+a.c36,t.r36+t.c36],w7:[a.r7+a.c7,t.r7+t.c7],s:[a.s,t.s],cl:[a.cl,t.cl],prog:tw>0?aw/tw:0};};
  var rowHTML=function(lab,list,cls){var x=cellset(list);var pc=x.prog>=1?'var(--good)':x.prog>=0.6?'var(--warn)':'var(--bad)';
    return '<tr'+(cls?' class="'+cls+'"':'')+'><td class="l">'+lab+'</td><td>'+x.goal+'%</td><td>'+ratioCell(x.c[0],x.c[1])+'</td><td>'+ratioCell(x.w36[0],x.w36[1])+'</td><td>'+ratioCell(x.w7[0],x.w7[1])+'</td><td>'+ratioCell(x.s[0],x.s[1])+'</td><td>'+ratioCell(x.cl[0],x.cl[1])+'</td><td><b style="color:'+pc+'">'+pct(x.prog)+'</b></td></tr>';};
  var body='';
  if(step5view==='branch'){COLS=8;
    body=groupRows(function(b){return rowHTML(b.name,[b]);},function(list,lab,cls){return rowHTML(lab,list,cls);});}
  else if(step5view==='zone'){[1,2,3].forEach(function(z){body+=rowHTML('เขต '+z,DATA.filter(function(b){return b.zone===z;}),'zone-t');});body+=rowHTML('ภาพรวมทั้งหมด',DATA,'grand');}
  else if(step5view==='type'){body+=rowHTML('รถใหม่ (21 สาขา)',DATA.filter(function(b){return b.type==='new';}),'zone-t');body+=rowHTML('รถมือสอง (16 สาขา)',DATA.filter(function(b){return b.type==='used';}),'zone-t');body+=rowHTML('ภาพรวมทั้งหมด',DATA,'grand');}
  else{body+=rowHTML('ภาพรวมทั้งหมด 37 สาขา',DATA,'grand');[1,2,3].forEach(function(z){body+=rowHTML('— เขต '+z,DATA.filter(function(b){return b.zone===z;}));});}
  return '<div class="card"><div class="h2">ขั้นที่ 5 · ติดตามผล (เทียบเป้าที่วางไว้)</div>'+
    '<div class="lead">ดูผลงานจริงเทียบเป้าทุกด้าน เลือกดูรายสาขา / รายเขต / แยกประเภทรถ / ภาพรวม เพื่อเปรียบเทียบ</div>'+sel+
    '<div class="dwrap"><table><thead><tr>'+heads+'</tr></thead><tbody>'+body+'</tbody></table></div></div>';
}
function step6(){
  COLS=6; var pass=0; DATA.forEach(function(b){if(monthEndPct(b)*100>=b.plan.goal)pass++;});
  var rowFn=function(b){var me=monthEndPct(b),ok=me*100>=b.plan.goal,pr=prog(b);
    return '<tr><td class="l">'+b.name+'</td><td>'+pct(b.goodPct)+'</td><td>'+b.plan.goal+'%</td><td><b style="color:'+(ok?'var(--good)':'var(--bad)')+'">'+pct(me)+'</b></td><td>'+pct(pr)+'</td><td>'+(ok?'<span class="pill p-good">ผ่านเป้า</span>':'<span class="pill p-bad">ไม่ถึงเป้า</span>')+'</td></tr>';};
  var subFn=function(list,lab,cls){var t=list.reduce(function(s,b){return s+b.total;},0),meG=list.reduce(function(s,b){return s+monthEndPct(b)*b.total;},0),p=list.filter(function(b){return monthEndPct(b)*100>=b.plan.goal;}).length,pg=list.reduce(function(s,b){return s+prog(b);},0)/list.length;return '<tr class="'+cls+'"><td class="l">'+lab+'</td><td></td><td></td><td><b>'+pct(meG/t)+'</b></td><td>'+pct(pg)+'</td><td>ผ่าน '+p+'/'+list.length+'</td></tr>';};
  return '<div class="card"><div class="h2">ขั้นที่ 6 · ประเมินผล &amp; ปิดจบเดือน</div>'+

    '<div class="kpis"><div class="kpi"><div class="l">สาขาผ่านเป้า</div><div class="v" style="color:var(--good)">'+pass+' / 37</div></div>'+

    '<div class="kpi"><div class="l">%งานสำเร็จเฉลี่ย</div><div class="v">'+pct(DATA.reduce(function(s,b){return s+prog(b);},0)/37)+'</div></div>'+

function renderStepper(){document.getElementById('stepper').innerHTML=STEPS.map(function(s,i){var n=i+1;var cls=n===STEP?'step active':(n<STEP?'step done':'step');return '<div class="'+cls+'" data-step="'+n+'"><div class="n">'+(n<STEP?'✓':n)+'</div><div class="t">'+s+'</div></div>';}).join('');document.querySelectorAll('#stepper .step').forEach(function(el){el.onclick=function(){STEP=parseInt(el.dataset.step);renderAll();};});}

function renderStep(){var fn=[step1,step2,step3,step4,step5,step6][STEP-1];document.getElementById('content').innerHTML=fn()+navBar();wire();}

    ['c_g0','c_g1','c_g2','r_g3','r_g4','r_g5','r_g6','r_g7','cut_g3','cut_g4','cut_g5','cut_g6','cut_g7','m_sale','m_matN','m_matC','m_goal'].forEach(function(id){var e=document.getElementById(id);if(e)e.oninput=us2;});

[['gm','ผู้จัดการฝ่าย / GM'],['z1','ซุปการเงิน เขต 1'],['z2','ซุปการเงิน เขต 2'],['z3','ซุปการเงิน เขต 3'],['branch','สาขา (02-ระโนด1)']].forEach(function(r){var o=document.createElement('option');o.value=r[0];o.textContent=r[1];roleSel.appendChild(o);});
